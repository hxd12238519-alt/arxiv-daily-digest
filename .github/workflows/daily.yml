name: Daily arXiv Digest

on:
  schedule:
    # 09:00 Japan Standard Time is 00:00 UTC.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  daily:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Restore analysis cache
        uses: actions/cache/restore@v4
        with:
          path: data
          key: arxiv-digest-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            arxiv-digest-db-${{ github.ref_name }}-

      - name: Clean generated reports
        run: |
          find reports -type f ! -name .gitkeep -delete
          mkdir -p data

      - name: Run daily digest
        env:
          ARXIV_DIGEST_PROVIDER: ${{ vars.ARXIV_DIGEST_PROVIDER || 'deepseek' }}
          ARXIV_DIGEST_DEFAULT_PROFILE: ${{ vars.ARXIV_DIGEST_DEFAULT_PROFILE || 'physics_student' }}
          ARXIV_DIGEST_EXTRA_PROFILES: ${{ vars.ARXIV_DIGEST_EXTRA_PROFILES || 'spt_anomaly_generalized_symmetry' }}
          ARXIV_DIGEST_DAILY_LOOKBACK_HOURS: ${{ vars.ARXIV_DIGEST_DAILY_LOOKBACK_HOURS || '36' }}
          ARXIV_DIGEST_BACKFILL_LOOKBACK_HOURS: ${{ vars.ARXIV_DIGEST_BACKFILL_LOOKBACK_HOURS || '168' }}
          ARXIV_DIGEST_LLM_CONCURRENCY: ${{ vars.ARXIV_DIGEST_LLM_CONCURRENCY || '4' }}
          ARXIV_DIGEST_WEB_PUBLIC_BASE_URL: ${{ vars.ARXIV_DIGEST_WEB_PUBLIC_BASE_URL || '' }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || '' }}
          DASHSCOPE_MODEL: ${{ vars.DASHSCOPE_MODEL || '' }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || '' }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || '' }}
          CUSTOM_LLM_API_KEY: ${{ secrets.CUSTOM_LLM_API_KEY }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m arxiv_digest run-daily \
            --profile "$ARXIV_DIGEST_DEFAULT_PROFILE" \
            --provider "$ARXIV_DIGEST_PROVIDER" \
            --lookback-hours "$ARXIV_DIGEST_DAILY_LOOKBACK_HOURS"
          python -m arxiv_digest run-daily \
            --profile "$ARXIV_DIGEST_DEFAULT_PROFILE" \
            --provider "$ARXIV_DIGEST_PROVIDER" \
            --lookback-hours "$ARXIV_DIGEST_BACKFILL_LOOKBACK_HOURS" \
            --report-suffix 7d
          for profile in $ARXIV_DIGEST_EXTRA_PROFILES; do
            python -m arxiv_digest run-daily \
              --profile "$profile" \
              --provider "$ARXIV_DIGEST_PROVIDER" \
              --lookback-hours "$ARXIV_DIGEST_DAILY_LOOKBACK_HOURS"
            python -m arxiv_digest run-daily \
              --profile "$profile" \
              --provider "$ARXIV_DIGEST_PROVIDER" \
              --lookback-hours "$ARXIV_DIGEST_BACKFILL_LOOKBACK_HOURS" \
              --report-suffix 7d
          done

      - name: Save analysis cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: arxiv-digest-db-${{ github.ref_name }}-${{ github.run_id }}

      - name: Build static site
        env:
          ARXIV_DIGEST_WEB_PUBLIC_BASE_URL: ${{ vars.ARXIV_DIGEST_WEB_PUBLIC_BASE_URL || '' }}
        run: python -m arxiv_digest build-site --site-dir site

      - name: Validate public site
        run: |
          if grep -R -E "2605\.2300[12]|Mock 中文标题|Mock 主要结果" site; then
            echo "::error::Refusing to deploy sample/mock report content."
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

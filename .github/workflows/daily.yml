name: Daily arXiv Digest

on:
  schedule:
    # 09:00 Japan Standard Time is 00:00 UTC.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  daily:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run daily digest
        env:
          ARXIV_DIGEST_PROVIDER: ${{ vars.ARXIV_DIGEST_PROVIDER || 'mock' }}
          ARXIV_DIGEST_DEFAULT_PROFILE: ${{ vars.ARXIV_DIGEST_DEFAULT_PROFILE || 'physics_student' }}
          ARXIV_DIGEST_EXTRA_PROFILES: ${{ vars.ARXIV_DIGEST_EXTRA_PROFILES || '' }}
          ARXIV_DIGEST_WEB_PUBLIC_BASE_URL: ${{ vars.ARXIV_DIGEST_WEB_PUBLIC_BASE_URL || '' }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || '' }}
          DASHSCOPE_MODEL: ${{ vars.DASHSCOPE_MODEL || '' }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || '' }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || '' }}
          CUSTOM_LLM_API_KEY: ${{ secrets.CUSTOM_LLM_API_KEY }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m arxiv_digest run-daily \
            --profile "$ARXIV_DIGEST_DEFAULT_PROFILE" \
            --provider "$ARXIV_DIGEST_PROVIDER"
          for profile in $ARXIV_DIGEST_EXTRA_PROFILES; do
            python -m arxiv_digest run-daily \
              --profile "$profile" \
              --provider "$ARXIV_DIGEST_PROVIDER"
          done

      - name: Build static site
        env:
          ARXIV_DIGEST_WEB_PUBLIC_BASE_URL: ${{ vars.ARXIV_DIGEST_WEB_PUBLIC_BASE_URL || '' }}
        run: python -m arxiv_digest build-site --site-dir site

      - name: Commit reports and database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports data
          if git diff --cached --quiet; then
            echo "No report or database changes to commit."
          else
            git commit -m "Update arXiv daily digest"
            git push || echo "::warning::Could not push generated reports; Pages deploy will continue."
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

default_profile: physics_student

profiles:
  physics_student:
    display_name: "Strongly Correlated Electrons"
    display_name_zh: "强关联电子方向"
    description: "Daily digest for all new arXiv cond-mat.str-el papers, excluding machine learning centered papers."
    arxiv:
      categories:
        - cond-mat.str-el
      keywords: []
      excluded_categories:
        - cs.AI
        - cs.LG
        - cs.CL
        - cs.CV
        - stat.ML
      excluded_keywords:
        - machine learning
        - deep learning
        - neural network
        - large language model
        - LLM
        - generative AI
        - diffusion model
        - transformer
        - foundation model
        - RAG
        - retrieval augmented generation
        - AI agent
      max_results_per_day: 500
      page_size: 50
      request_interval_seconds: 3
      lookback_hours: 36
      timezone: Asia/Tokyo
    topics:
      - topic: "Strongly Correlated Systems"
        topic_zh: "强关联体系"
      - topic: "Mott Physics / Hubbard Models"
        topic_zh: "莫特物理 / Hubbard 模型"
      - topic: "Quantum Magnetism"
        topic_zh: "量子磁性"
      - topic: "Unconventional Superconductivity"
        topic_zh: "非常规超导"
      - topic: "Charge / Spin / Orbital Order"
        topic_zh: "电荷 / 自旋 / 轨道有序"
      - topic: "Frustrated Magnets / Spin Liquids"
        topic_zh: "阻挫磁性 / 自旋液体"
      - topic: "Heavy Fermions / Kondo Physics"
        topic_zh: "重费米子 / 近藤物理"
      - topic: "Moiré Correlated Materials"
        topic_zh: "莫尔强关联材料"
      - topic: "Correlated Topological Phases"
        topic_zh: "强关联拓扑相"
      - topic: "Numerical Many-Body Methods"
        topic_zh: "多体数值方法"
      - topic: "Other Strong-Correlation Physics"
        topic_zh: "其他强关联物理"

  spt_anomaly_generalized_symmetry:
    display_name: "SPT / Quantum Anomaly / Generalized Symmetry"
    display_name_zh: "SPT / 量子反常 / 广义对称性"
    description: "Focused profile for symmetry-protected topological phases, quantum anomalies, generalized symmetries, higher-form symmetries, and related topological field theory or lattice model work."
    arxiv:
      categories:
        - cond-mat.mes-hall
        - cond-mat.other
        - cond-mat.mtrl-sci
        - cond-mat.str-el
        - cond-mat.supr-con
        - cond-mat.stat-mech
        - quant-ph
        - hep-th
        - math-ph
      keywords:
        - symmetry protected topological
        - symmetry-protected topological
        - SPT phase
        - SPT phases
        - SPT order
        - bosonic SPT
        - fermionic SPT
        - short-range entangled
        - invertible topological phase
        - invertible phase
        - topological response
        - topological theta term
        - quantum anomaly
        - quantum anomalies
        - anomaly matching
        - anomalous symmetry
        - mixed anomaly
        - mixed anomalies
        - global anomaly
        - gauge anomaly
        - chiral anomaly
        - gravitational anomaly
        - anomaly inflow
        - t Hooft anomaly
        - generalized symmetry
        - generalized symmetries
        - generalized global symmetry
        - generalized global symmetries
        - higher-form symmetry
        - higher-form symmetries
        - higher form symmetry
        - higher form symmetries
        - higher-group symmetry
        - higher group symmetry
        - one-form symmetry
        - one-form symmetries
        - 1-form symmetry
        - 1-form symmetries
        - two-form symmetry
        - two-form symmetries
        - 2-form symmetry
        - 2-form symmetries
        - subsystem symmetry
        - subsystem symmetries
        - non-invertible symmetry
        - non-invertible symmetries
        - noninvertible symmetry
        - noninvertible symmetries
        - categorical symmetry
        - categorical symmetries
        - fusion category symmetry
        - symmetry defect
        - topological defect
        - duality defect
        - symmetry fractionalization
        - symmetry enriched topological
        - SET phase
        - Lieb-Schultz-Mattis anomaly
        - LSM anomaly
        - boundary anomaly
        - gapless boundary
        - anomalous boundary
        - group cohomology
        - cobordism
        - cobordism classification
        - topological quantum field theory
        - TQFT
      excluded_categories:
        - cs.AI
        - cs.LG
        - cs.CL
        - cs.CV
        - stat.ML
      excluded_keywords:
        - machine learning
        - deep learning
        - neural network
        - large language model
        - LLM
        - generative AI
        - diffusion model
        - transformer
        - foundation model
        - RAG
        - retrieval augmented generation
        - AI agent
      max_results_per_day: 100
      page_size: 50
      request_interval_seconds: 3
      lookback_hours: 36
      timezone: Asia/Tokyo
    topics:
      - topic: "Symmetry-Protected Topological Phases / SPT"
        topic_zh: "对称性保护拓扑相 / SPT"
      - topic: "Quantum Anomalies / Anomaly Matching"
        topic_zh: "量子反常 / 反常匹配"
      - topic: "Generalized Global Symmetries"
        topic_zh: "广义全局对称性"
      - topic: "Higher-Form Symmetries"
        topic_zh: "高形式对称性"
      - topic: "Non-Invertible / Categorical Symmetries"
        topic_zh: "非可逆 / 范畴对称性"
      - topic: "Symmetry-Enriched Topological Order"
        topic_zh: "对称性富集拓扑序"
      - topic: "Topological Field Theory / Cobordism"
        topic_zh: "拓扑场论 / 配边理论"
      - topic: "Boundary Anomaly / Anomaly Inflow"
        topic_zh: "边界反常 / 反常流入"
      - topic: "Lattice Models and Spin Systems"
        topic_zh: "晶格模型与自旋体系"
      - topic: "Other SPT / Symmetry Physics"
        topic_zh: "其他 SPT / 对称性物理"

llm:
  provider: deepseek
  model: deepseek-chat
  temperature: 0.2
  timeout_seconds: 60
  max_retries: 3
  request_interval_seconds: 1
  concurrent_requests: 4
  mode: abstract_only

providers:
  custom_http:
    endpoint: ""
    api_key_env: CUSTOM_LLM_API_KEY
    model: ""
  litellm:
    api_key_env: LITELLM_API_KEY
    model: ""
    base_url: ""
  gemini:
    api_key_env: GEMINI_API_KEY
    model: ""
  claude:
    api_key_env: ANTHROPIC_API_KEY
    model: ""
  deepseek:
    api_key_env: DEEPSEEK_API_KEY
    model: "deepseek-chat"
    base_url: "https://api.deepseek.com"
  qwen:
    api_key_env: DASHSCOPE_API_KEY
    model: ""
  ollama:
    base_url: "http://localhost:11434"
    model: "qwen2.5:7b"

output:
  report_dir: reports
  formats:
    - markdown
    - html
    - json
  min_relevance_score: 0
  top_n: 100

database:
  path: data/arxiv_digest.sqlite3

web:
  host: "127.0.0.1"
  port: 8000
  auto_run_on_open: true
  enable_scheduler: true
  daily_run_time: "09:00"
  require_admin_token_for_force: true
  require_admin_token_for_run: true
  allow_public_auto_run: false
  public_base_url: ""

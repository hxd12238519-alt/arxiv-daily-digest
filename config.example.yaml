      request_interval_seconds: 3
      lookback_hours: 24
      timezone: Asia/Tokyo
    topics:
      - topic: "Symmetry-Protected Topological Phases / SPT"
        topic_zh: "对称性保护拓扑相 / SPT"
      - topic: "Quantum Anomalies / Anomaly Matching"
        topic_zh: "量子反常 / 反常匹配"
      - topic: "Generalized Global Symmetries"
        topic_zh: "广义全局对称性"
      - topic: "Higher-Form Symmetries"
        topic_zh: "高形式对称性"

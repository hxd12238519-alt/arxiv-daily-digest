default_profile: physics_student

profiles:
  physics_student:
    display_name: "Physics Student"
    display_name_zh: "物理系学生通用方向"
    description: "General physics literature profile for a physics student, excluding machine learning centered papers."
    arxiv:
      categories:
        - cond-mat.mes-hall
        - cond-mat.mtrl-sci
        - cond-mat.str-el
        - cond-mat.supr-con
        - cond-mat.stat-mech
        - cond-mat.quant-gas
        - quant-ph
        - physics.atom-ph
        - physics.optics
        - physics.app-ph
        - math-ph
      keywords:
        - condensed matter
        - quantum matter
        - quantum phase
        - quantum transport
        - quantum Hall
        - anomalous Hall
        - topological
        - Berry curvature
        - superconductivity
        - superconductor
        - strongly correlated
        - spin liquid
        - quantum criticality
        - low-dimensional
        - two-dimensional
        - 2D material
        - graphene
        - van der Waals
        - moire
        - moiré
        - cold atoms
        - optical lattice
        - quantum simulation
        - quantum optics
        - many-body
        - field theory
        - statistical mechanics
      excluded_categories:
        - cs.AI
        - cs.LG
        - cs.CL
        - cs.CV
        - stat.ML
      excluded_keywords:
        - machine learning
        - deep learning
        - neural network
        - large language model
        - LLM
        - generative AI
        - diffusion model
        - transformer
        - foundation model
        - RAG
        - retrieval augmented generation
        - AI agent
      max_results_per_day: 100
      page_size: 50
      request_interval_seconds: 3
      lookback_hours: 24
      timezone: Asia/Tokyo
    topics:
      - topic: "Condensed Matter Physics"
        topic_zh: "凝聚态物理"
      - topic: "Topological Quantum Matter"
        topic_zh: "拓扑量子物态"
      - topic: "Quantum Hall / Anomalous Hall"
        topic_zh: "量子霍尔 / 反常霍尔"
      - topic: "Superconductivity"
        topic_zh: "超导物理"
      - topic: "Strongly Correlated Systems"
        topic_zh: "强关联体系"
      - topic: "Quantum Magnetism"
        topic_zh: "量子磁性"
      - topic: "Quantum Gases / Cold Atoms"
        topic_zh: "量子气体 / 冷原子"
      - topic: "Quantum Optics"
        topic_zh: "量子光学"
      - topic: "Statistical Mechanics"
        topic_zh: "统计物理"
      - topic: "Mathematical Physics"
        topic_zh: "数学物理"
      - topic: "Applied Physics / Materials"
        topic_zh: "应用物理 / 材料"
      - topic: "Other Physics"
        topic_zh: "其他物理方向"

